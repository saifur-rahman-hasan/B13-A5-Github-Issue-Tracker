<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Tailwindcss and Fontawesome -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-700">
    <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/95 backdrop-blur">
        <nav class="mx-auto flex w-full max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
            <div class="flex items-center gap-2 sm:gap-3">
                <img src="assets/github-logo.png" alt="GitHub logo" class="h-7 w-7 object-contain">
                <h1 class="text-base font-extrabold tracking-tight text-slate-800 sm:text-xl">GitHub Issues Tracker</h1>
            </div>

            <div class="flex w-full max-w-xs items-center gap-2 sm:max-w-md">
                <div class="relative flex-1">
                    <i class="fa fa-search pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400"></i>
                    <input
                        id="searchInput"
                        type="text"
                        placeholder="Search issues..."
                        class="w-full rounded-md border border-slate-200 bg-slate-50 py-2 pr-3 pl-8 text-sm outline-none transition focus:border-indigo-400 focus:bg-white"
                    >
                </div>
                <button id="searchButton" type="button" class="shrink-0 rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-emerald-700 sm:px-4">
                    <i class="fa fa-search mr-1.5" aria-hidden="true"></i>Search
                </button>
            </div>
        </nav>
    </header>

    <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 sm:py-8">
        <section class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm sm:p-6">
            <div>
                <div class="grid grid-cols-1 sm:hidden">
                    <select id="mobileTabSelect" aria-label="Select a tab" class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white py-2 pr-8 pl-3 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600">
                        <option value="all" selected>All</option>
                        <option value="open">Open</option>
                        <option value="closed">Closed</option>
                    </select>
                    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end fill-gray-500">
                        <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
                    </svg>
                </div>

                <div class="hidden sm:block">
                    <nav aria-label="Tabs" class="flex space-x-4">
                        <button type="button" data-tab="all" aria-current="page" class="tab-trigger rounded-md bg-indigo-100 px-3 py-2 text-sm font-medium text-indigo-700">All</button>
                        <button type="button" data-tab="open" class="tab-trigger rounded-md px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Open</button>
                        <button type="button" data-tab="closed" class="tab-trigger rounded-md px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700">Closed</button>
                    </nav>
                </div>
            </div>
        </section>

        <section class="mt-4 rounded-lg border border-slate-200 bg-white shadow-sm">
            <div class="flex flex-col justify-between gap-3 border-b border-slate-200 px-4 py-4 sm:flex-row sm:items-center sm:px-6">
                <div class="flex items-center gap-3">
                    <span class="grid h-10 w-10 place-items-center rounded-full bg-indigo-100">
                        <img src="assets/Aperture.png" alt="All Issues" class="h-6 w-6 object-contain">
                    </span>
                    <div>
                        <h2 class="text-lg font-extrabold text-slate-800"><span id="issueCount">50</span> Issues</h2>
                        <p class="text-sm text-slate-500">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-sm">
                    <span class="inline-flex items-center gap-1.5 text-slate-600">
                        <span class="size-3 bg-emerald-500 rounded-full"></span>
                        Open
                    </span>
                    <span class="inline-flex items-center gap-1.5 text-slate-600">
                        <span class="size-3 bg-violet-500 rounded-full"></span>
                        Closed
                    </span>
                </div>
            </div>

            <div id="issuesGrid" class="grid gap-4 p-4 sm:grid-cols-2 sm:p-6 lg:grid-cols-3 xl:grid-cols-4"></div>
        </section>
    </main>

    <el-dialog>
        <dialog id="issueDetailDialog" aria-labelledby="issue-dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent">
            <el-dialog-backdrop class="fixed inset-0 bg-slate-900/45 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"></el-dialog-backdrop>

            <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center">
                <el-dialog-panel class="relative w-full max-w-2xl transform overflow-hidden rounded-xl bg-white px-6 py-6 text-left shadow-xl transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:px-8 sm:py-8 data-closed:sm:translate-y-0 data-closed:sm:scale-95">
                    <h3 id="issue-dialog-title" class="text-2xl font-bold tracking-tight text-slate-900"></h3>

                    <div class="mt-4 flex flex-wrap items-center gap-2 text-sm text-slate-600">
                        <span id="issue-dialog-status-badge" class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold"></span>
                        <span class="inline-flex items-center gap-1"><i class="fa fa-user-o text-slate-400" aria-hidden="true"></i>Opened By <span id="issue-dialog-author"></span></span>
                        <span class="inline-flex items-center gap-1"><i class="fa fa-calendar text-slate-400" aria-hidden="true"></i><span id="issue-dialog-created"></span></span>
                    </div>

                    <div id="issue-dialog-labels" class="mt-4 flex flex-wrap items-center gap-1.5"></div>

                    <p id="issue-dialog-description" class="mt-6 text-base leading-relaxed text-slate-700"></p>

                    <div class="mt-8 grid gap-4 rounded-lg bg-slate-50 p-4 sm:grid-cols-2">
                        <div class="border-r border-slate-200 sm:border-r">
                            <p class="text-sm font-semibold text-slate-600">Assignee</p>
                            <p id="issue-dialog-assignee" class="mt-2 text-base font-semibold text-slate-900"></p>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-600">Priority</p>
                            <span id="issue-dialog-priority-badge" class="mt-2 inline-flex items-center rounded-full px-3 py-1 text-sm font-medium uppercase"></span>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-end gap-3">
                        <button type="button" command="close" commandfor="issueDetailDialog" class="inline-flex items-center justify-center rounded-lg bg-indigo-600 px-6 py-2 text-sm font-semibold text-white transition hover:bg-indigo-700">
                            Close
                        </button>
                    </div>
                </el-dialog-panel>
            </div>
        </dialog>
    </el-dialog>

    <!-- Axios and app.js -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
